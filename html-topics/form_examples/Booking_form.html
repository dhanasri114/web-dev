<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="booking_styles.css">
</head>
<body>
    <h1>Hotel Booking Form</h1>

    <form>
        <h3>Guest Details</h3>
        <label>Name</label>
        <input type="text" name="name">
        <label>Phone number</label>
        <input type="number" name="number">
        <br><br>

        <label>Address</label>
        <input type="text" name="address">
        <label>city</label>
        <input type="text" name="city">
        <br><br>
        <label>state</label>
        <input type="text" name="state">
        <label>pincode</label>
        <input type="number" name="pincode">
        <h3>Country</h3>
        <select name="country">
            <option>select</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="sri_lanka">SriLanka</option>
        </select>
        
        <br><br>

        <h3>Booking Details</h3>
        <label>Check-in Date</label>
        <input type="date" name="date_in">
        <br><br>
        <label>Check-out Date</label>
        <input type="date" name="date_out">
        <br><br>
    
        <label>Number of Guests</label>
        <br>
        <input type="number" name="Guest">

        <h3>Room Types</h3>
        <input type="checkbox" name="room_type" value="single_room">Single Room
        
        <ul>
            <li><input type="checkbox" name="bed_type" value="single_bed">Single Bed</li>
            <li><input type="checkbox" name="bed_type" value="double_bed">Double Bed</li>
        </ul>
         
       <input type="checkbox" name="room_type" value="double_room">Double Room

        <ul>
            <li><input type="checkbox" name="bed_type" value="single_bed">Single_Bed</li>
            <li><input type="checkbox" name="bed_type" value="double_bed">Double_Bed</li>
        </ul>
        
        <h3>Payment Details</h3>
        <input type="radio" name="Payment" value="cash">Cash
        <input type="radio" name="Payment" value="phonepay">Phone Pay
        <input type="radio" name="Payment" value="card">Card
        <br><br>
        <button>Booking</button>
    </form>
    <a href="booking_backend.html">backend</a>
</body>
</html>
