<head>

    <title>Document</title>
    <link rel="stylesheet" href="list_style.css">
</head>
<body>
    <h2>List Styles in css</h2>

        <li>Red</li>
        <li>Blue</li>

    <h3>Colors</h3>
    <ol style="list-style:circle;">
        <li>Red</li>
        <li>Blue</li>
        <li>White</li>
        <li>Yellow</li>
        <li>Orange</li>
    </ol>
